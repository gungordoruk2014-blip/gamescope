<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GameScope</title>

<style>
body{margin:0;font-family:Arial;color:white;background:black;}
body::before{
content:"";position:fixed;width:100%;height:100%;
background: radial-gradient(circle at 50% 100%, orange, red, black);
animation:fire 3s infinite alternate;z-index:-1;}
@keyframes fire{0%{filter:blur(10px);}100%{filter:blur(25px);}}

header{text-align:center;padding:20px;font-size:30px;color:#ffae00;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px;}
.card{background:rgba(0,0,0,0.7);padding:10px;border-radius:10px;}
button{margin-top:10px;padding:8px;background:#ffae00;border:none;border-radius:5px;}

.popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;padding:20px;}
</style>
</head>

<body>

<header>🔥 GameScope 🔥</header>

<div class="container">

<script>
let games = [
"GTA 6","FC 25","Call of Duty","Minecraft","Fortnite","Valorant",
"RDR2","Cyberpunk","The Last of Us","God of War","Spider-Man",
"FIFA 23","NBA 2K","Resident Evil","Assassin's Creed","Far Cry",
"Battlefield","Hogwarts Legacy","Elden Ring","Dark Souls",
"GTA 5","Forza Horizon","Need for Speed","CS2","PUBG",
"Apex Legends","Among Us","Roblox","Brawl Stars","Clash Royale",
"Rocket League","Fall Guys","Dying Light","Watch Dogs","Hitman",
"Death Stranding","Days Gone","Uncharted","Ghost of Tsushima",
"Skyrim","The Witcher 3","Metro Exodus","DOOM","Halo",
"Overwatch","Terraria","Subnautica","Ark","Rust"
];

document.write(games.map(g=>`
<div class="card">
<h3>${g}</h3>
<button onclick="openPopup('${g}')">İncele</button>
</div>
`).join(""));
</script>

</div>

<div id="popup" class="popup">
<h1 id="title"></h1>
<p id="desc"></p>
<button onclick="closePopup()">Kapat</button>
</div>

<script>
function openPopup(game){
document.getElementById("title").innerText=game;
document.getElementById("desc").innerText=game+" hakkında detaylar yakında eklenecek.";
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
