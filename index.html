<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GameScope</title>

<style>
body{margin:0;background:black;color:white;font-family:Arial;}
header{text-align:center;padding:20px;font-size:30px;color:orange;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:20px;}
.card{background:#111;padding:10px;border-radius:10px;text-align:center;}
img{width:100%;height:120px;object-fit:cover;border-radius:8px;}
button{margin-top:10px;padding:8px;background:orange;border:none;border-radius:5px;}
.popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;padding:20px;}
</style>
</head>

<body>

<header>🎮 GameScope</header>

<div class="container" id="games"></div>

<div id="popup" class="popup">
<h1 id="title"></h1>
<p id="desc"></p>
<button onclick="closePopup()">Kapat</button>
</div>

<script>

let games = [
"GTA 6","FC 25","Call of Duty","Minecraft","Fortnite","Valorant",
"RDR2","Cyberpunk","God of War","Spider-Man"
];

let html = "";

for(let i=0;i<games.length;i++){
html += `
<div class="card">
<img src="https://picsum.photos/400/300?random=${i}">
<h3>${games[i]}</h3>
<button onclick="openGame('${games[i]}')">İncele</button>
</div>
`;
}

document.getElementById("games").innerHTML = html;

function openGame(game){
document.getElementById("title").innerText = game;

if(game=="GTA 6"){
document.getElementById("desc").innerText="GTA 6 Rockstar Games'in en büyük oyunu olacak. Dev harita, gerçekçi grafikler ve özgür oynanış sunacak. Oyuncular şehirde istedikleri gibi dolaşıp görev yapabilecek.";
}else{
document.getElementById("desc").innerText=game+" hakkında bilgiler yakında eklenecek.";
}

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
