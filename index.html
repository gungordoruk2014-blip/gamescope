<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameScope</title>

<style>
body {margin:0;font-family:Arial;color:white;background:black;}
body::before {
content:"";position:fixed;width:100%;height:100%;
background: radial-gradient(circle at 50% 100%, orange, red, black);
animation: fire 3s infinite alternate;z-index:-1;}
@keyframes fire {0%{filter: blur(10px);}100%{filter: blur(25px);}}

header {text-align:center;padding:20px;font-size:30px;color:#ffae00;}

.container {display:grid;grid-template-columns: repeat(auto-fit, minmax(250px,1fr));gap:20px;padding:20px;}

.card {background: rgba(0,0,0,0.7);padding:15px;border-radius:10px;transition:0.3s;}
.card:hover {transform:scale(1.05);}

button {margin-top:10px;padding:10px;border:none;background:#ffae00;cursor:pointer;border-radius:5px;}

.popup {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;padding:20px;}
</style>
</head>

<body>

<header>🔥 GameScope 🔥</header>

<div class="container">

<div class="card">
<h2>GTA 6</h2>
<p>Büyük açık dünya oyunu.</p>
<button onclick="openPopup('gta')">İncele</button>
</div>

<div class="card">
<h2>FC 25</h2>
<p>Futbol oyunu.</p>
<button onclick="openPopup('fc')">İncele</button>
</div>

<div class="card">
<h2>Call of Duty</h2>
<p>FPS oyunu.</p>
<button onclick="openPopup('cod')">İncele</button>
</div>

<div class="card">
<h2>Minecraft</h2>
<p>Sandbox oyunu.</p>
<button onclick="openPopup('mc')">İncele</button>
</div>

<div class="card">
<h2>Fortnite</h2>
<p>Battle royale.</p>
<button onclick="openPopup('fn')">İncele</button>
</div>

<div class="card">
<h2>Valorant</h2>
<p>Taktiksel FPS.</p>
<button onclick="openPopup('val')">İncele</button>
</div>

</div>

<div id="popup" class="popup">
<h1 id="title"></h1>
<p id="desc"></p>
<button onclick="closePopup()">Kapat</button>
</div>

<script>
function openPopup(game){
let title=document.getElementById("title");
let desc=document.getElementById("desc");

if(game=="gta"){title.innerText="GTA 6";desc.innerText="GTA 6 dev açık dünya oyunu.";}
if(game=="fc"){title.innerText="FC 25";desc.innerText="Futbol deneyimi.";}
if(game=="cod"){title.innerText="Call of Duty";desc.innerText="Aksiyon FPS.";}
if(game=="mc"){title.innerText="Minecraft";desc.innerText="Yaratıcılık oyunu.";}
if(game=="fn"){title.innerText="Fortnite";desc.innerText="Battle royale.";}
if(game=="val"){title.innerText="Valorant";desc.innerText="Rekabetçi FPS.";}

document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
