<!DOCTYPE html>
<html>
<head>
<title>GameScope</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:Arial;">

<h1>🎮 GameScope</h1>

<script>
function ac(oyun){
let yazi = "";

if(oyun=="GTA 6"){
yazi = "GTA 6 Rockstar Games'in en büyük oyunlarından biridir. Dev harita, gerçekçi grafikler, özgür oynanış sunar. Oyuncular şehirde dolaşabilir, görev yapabilir ve kendi hikayelerini oluşturabilir. Oyun dünyası çok detaylıdır. Araçlar, karakterler ve görevler gelişmiştir. Oyuncular saatlerce oynayabilir. Bu oyun oyun dünyasında büyük bir etki yaratacaktır.";
}else{
yazi = oyun + " çok popüler bir oyundur. Eğlencelidir, rekabet içerir ve milyonlarca kişi tarafından oynanmaktadır. Oyun sürekli güncellenir ve yeni özellikler eklenir.";
}

alert(yazi);
}
</script>

<h2>GTA 6</h2>
<button onclick="ac('GTA 6')">İncele</button>

<h2>FC 25</h2>
<button onclick="ac('FC 25')">İncele</button>

<h2>Call of Duty</h2>
<button onclick="ac('Call of Duty')">İncele</button>

<h2>Minecraft</h2>
<button onclick="ac('Minecraft')">İncele</button>

<h2>Fortnite</h2>
<button onclick="ac('Fortnite')">İncele</button>

<h2>Valorant</h2>
<button onclick="ac('Valorant')">İncele</button>

</body>
</html>
