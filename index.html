<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameScope</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    background:black;
}

/* 🔥 ATEŞ */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 50% 100%, orange, red, black);
    animation: fire 3s infinite alternate;
    z-index:-1;
}

@keyframes fire {
    0% {filter: blur(10px);}
    100% {filter: blur(25px);}
}

header {
    text-align:center;
    padding:20px;
    font-size:30px;
    color:#ffae00;
}

/* GRID */
.container {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* KART */
.card {
    background: rgba(0,0,0,0.7);
    padding:15px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

/* BUTON */
button {
    margin-top:10px;
    padding:10px;
    border:none;
    background:#ffae00;
    cursor:pointer;
    border-radius:5px;
}
</style>

</head>

<body>

<header>🔥 GameScope 🔥</header>

<div class="container">

<div class="card">
<h2>GTA 6</h2>
<p>Rockstar Games tarafından geliştirilen büyük açık dünya oyunu.</p>
<button onclick="window.location.href='gta6.html'">İncele</button>
</div>

<div class="card">
<h2>FC 25</h2>
<p>Yeni nesil futbol deneyimi.</p>
<button>İncele</button>
</div>

<div class="card">
<h2>Call of Duty</h2>
<p>Aksiyon dolu FPS serisi.</p>
<button>İncele</button>
</div>

<div class="card">
<h2>Minecraft</h2>
<p>Sınırsız yaratıcılık sunan oyun.</p>
<button>İncele</button>
</div>

<div class="card">
<h2>Fortnite</h2>
<p>Battle royale türünün lideri.</p>
<button>İncele</button>
</div>

<div class="card">
<h2>Valorant</h2>
<p>Taktiksel FPS oyunu.</p>
<button>İncele</button>
</div>

</div>

</body>
</html>
