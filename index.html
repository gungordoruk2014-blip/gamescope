<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GameScope</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 20px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            color: #38bdf8;
        }

        .container {
            padding: 20px;
        }

        .game-card {
            background: #1e293b;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .game-card:hover {
            transform: scale(1.03);
            background: #334155;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>🎮 GameScope</header>

<div class="container">

    <div class="game-card">
        <h2>GTA 6</h2>
        <p>Yeni nesil açık dünya oyunu geliyor!</p>
        <button>İncele</button>
    </div>

    <div class="game-card">
        <h2>FC 25</h2>
        <p>Yeni sezon, yeni kariyer modu.</p>
        <button>İncele</button>
    </div>

    <div class="game-card">
        <h2>Call of Duty</h2>
        <p>Aksiyon dolu savaş deneyimi.</p>
        <button>İncele</button>
    </div>

</div>

</body>
</html>
