<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameScope</title>
</head>
<body style="
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  text-align:center;
  background:
    radial-gradient(circle at bottom, orange 0%, red 25%, black 65%);
  min-height:100vh;
">

  <h1 style="padding:24px 0; margin:0;">🔥 GameScope 🔥</h1>

  <div style="max-width:900px; margin:0 auto; padding:20px;">

    <div style="background:#111; margin:15px; padding:20px; border-radius:12px;">
      <h2>GTA 6</h2>
      <button style="padding:10px 16px; border:none; border-radius:8px; background:orange; font-weight:bold;"
        onclick="alert('GTA 6, Rockstar Games tarafından geliştirilen büyük açık dünya oyunudur. Çok geniş harita, daha güçlü grafikler, yeni karakterler, gelişmiş görev sistemi ve daha canlı bir şehir sunması bekleniyor. Oyuncular uzun süre keşif yapabilecek, görevlere katılabilecek ve özgür şekilde dolaşabilecek.')">
        İncele
      </button>
    </div>

    <div style="background:#111; margin:15px; padding:20px; border-radius:12px;">
      <h2>FC 25</h2>
      <button style="padding:10px 16px; border:none; border-radius:8px; background:orange; font-weight:bold;"
        onclick="alert('FC 25, futbol severler için hazırlanan popüler bir spor oyunudur. Kariyer modu, çevrim içi maçlar, takım kurma sistemi ve gelişmiş oynanış özellikleriyle dikkat çeker. Oyuncular kendi kadrolarını kurabilir ve rakiplerle mücadele edebilir.')">
        İncele
      </button>
    </div>

    <div style="background:#111; margin:15px; padding:20px; border-radius:12px;">
      <h2>Call of Duty</h2>
      <button style="padding:10px 16px; border:none; border-radius:8px; background:orange; font-weight:bold;"
        onclick="alert('Call of Duty, aksiyon dolu bir savaş oyunudur. Hızlı çatışmalar, silah çeşitliliği, çevrim içi rekabet ve güçlü görev yapısıyla öne çıkar. Refleks, dikkat ve takım oyunu bu seride çok önemlidir.')">
        İncele
      </button>
    </div>

    <div style="background:#111; margin:15px; padding:20px; border-radius:12px;">
      <h2>Minecraft</h2>
      <button style="padding:10px 16px; border:none; border-radius:8px; background:orange; font-weight:bold;"
        onclick="alert('Minecraft, bloklarla kurulu yaratıcı bir dünyadır. Oyuncular ev, şehir ve farklı yapılar inşa edebilir. Hayatta kalma modu, keşif, maden toplama ve arkadaşlarla oynama gibi birçok eğlenceli özellik sunar.')">
        İncele
      </button>
    </div>

    <div style="background:#111; margin:15px; padding:20px; border-radius:12px;">
      <h2>Fortnite</h2>
      <button style="padding:10px 16px; border:none; border-radius:8px; background:orange; font-weight:bold;"
        onclick="alert('Fortnite, battle royale türünün en popüler oyunlarından biridir. Oyuncular büyük bir haritada hayatta kalmaya çalışır. Hızlı oynanışı, inşa sistemi ve sürekli gelen güncellemeleriyle çok sevilir.')">
        İncele
      </button>
    </div>

    <div style="background:#111; margin:15px; padding:20px; border-radius:12px;">
      <h2>Valorant</h2>
      <button style="padding:10px 16px; border:none; border-radius:8px; background:orange; font-weight:bold;"
        onclick="alert('Valorant, taktiksel bir FPS oyunudur. Her karakterin farklı yetenekleri vardır. Takım çalışması, dikkatli oynama, doğru nişan alma ve strateji bu oyunda kazanmak için çok önemlidir.')">
        İncele
      </button>
    </div>

  </div>

</body>
</html>
